<!DOCTYPE html>
<html lang="pt-br" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Servidor - Célula Python</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/htm@3/dist/htm.umd.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            jjk: {
              bg: '#050505',
              panel: '#0a0a0f',
              purple: '#a855f7',
              blue: '#0ea5e9',
              red: '#ef4444',
              gold: '#eab308',
              muted: '#8b8b93',
            }
          },
          fontFamily: {
            tech: ['Orbitron', 'sans-serif'],
            body: ['Rajdhani', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          animation: {
            'spin-slow': 'spin 8s linear infinite',
            'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0.6, 0.6, 1) infinite',
            'slide-up': 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
            'progress': 'progress 1.5s ease-in-out infinite',
            'aura-purple': 'auraPurple 2s ease-in-out infinite alternate',
          },
          keyframes: {
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            progress: {
              '0%': { backgroundPosition: '200% center' },
              '100%': { backgroundPosition: '-200% center' },
            },
            auraPurple: {
              '0%': { boxShadow: '0 0 10px rgba(168,85,247,0.1), inset 0 0 10px rgba(168,85,247,0.05)' },
              '100%': { boxShadow: '0 0 25px rgba(168,85,247,0.3), inset 0 0 15px rgba(168,85,247,0.1)' }
            }
          }
        }
      }
    }
  </script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      background-color: #050505;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(168, 85, 247, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(14, 165, 233, 0.05) 0%, transparent 40%),
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
      color: #fff;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(168, 85, 247, 0.5);
    }

    .glass {
      background: rgba(10, 10, 15, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .progress-bar {
      background-size: 200% 100%;
      background-image: linear-gradient(90deg, transparent, #a855f7, #ef4444, #0ea5e9, transparent);
    }

    .toast {
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .toast-success {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      border-color: rgba(14, 165, 233, 0.3);
    }

    .toast-error {
      background: linear-gradient(135deg, #991b1b, #ef4444);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .toast-info {
      background: linear-gradient(135deg, #6b21a8, #a855f7);
      border-color: rgba(168, 85, 247, 0.3);
    }

    .aura-active {
      position: relative;
    }

    .aura-active::after {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      z-index: -1;
      filter: blur(8px);
      background: linear-gradient(45deg, #a855f7, #ef4444, #0ea5e9);
      background-size: 400% 400%;
      animation: cursedGlow 5s ease infinite;
      border-radius: inherit;
      opacity: 0.4;
    }

    @keyframes cursedGlow {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .jjk-title {
      text-shadow: 0 0 10px rgba(168, 85, 247, 0.5), 0 0 20px rgba(14, 165, 233, 0.3);
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script>
    const html = htm.bind(React.createElement);
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ==================== TOAST ====================
    const Toast = ({ toasts }) => html`
        <div className="fixed bottom-6 right-6 z-[100] space-y-3 w-full max-w-xs transition-all pointer-events-none">
            ${toasts.map(t => html`
                <div key=${t.id} className="toast toast-${t.type} animate-slide-up flex items-center gap-3 pointer-events-auto">
                    <div className="shrink-0 w-2 h-2 rounded-full bg-white opacity-80 shadow-[0_0_8px_white]"></div>
                    ${t.msg}
                </div>`)}
        </div>
    `;

    // ==================== ICONS ====================
    const I = {
      Play: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
      Stop: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="6" width="12" height="12"/></svg>`,
      Search: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>`,
      Refresh: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>`,
      Info: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>`,
      Layout: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
      List: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
      Clock: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
      Bolt: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`,
      Shield: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
      Terminal: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>`,
      Layers: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`,
      X: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`
    };

    // ==================== SEARCH MODAL ====================
    const SearchModal = ({ isOpen, onClose, scripts, onAction }) => {
      const inputRef = useRef(null);
      const [q, setQ] = useState('');

      useEffect(() => {
        if (isOpen) {
          setTimeout(() => inputRef.current?.focus(), 50);
          setQ('');
        }
      }, [isOpen]);

      if (!isOpen) return null;

      const filtered = q.trim() === '' ? [] : scripts.filter(s =>
        s.name.toLowerCase().includes(q.toLowerCase()) ||
        (s.area || '').toLowerCase().includes(q.toLowerCase())
      );

      return html`
        <div className="fixed inset-0 z-[200] flex items-start justify-center pt-[15vh] p-6" onClick=${onClose}>
            <div className="absolute inset-0 bg-black/80 backdrop-blur-md"></div>
            <div className="w-full max-w-2xl bg-jjk-panel border border-jjk-purple/40 rounded-3xl animate-slide-up relative z-10 overflow-hidden shadow-[0_0_50px_rgba(168,85,247,0.15)] flex flex-col max-h-[70vh]" onClick=${e => e.stopPropagation()}>
                <div className="flex items-center bg-white/5 border-b border-white/10 p-5 shrink-0">
                    <${I.Search} className="text-jjk-purple mr-4" width=${22} />
                    <input 
                        ref=${inputRef} 
                        value=${q} 
                        onChange=${e => setQ(e.target.value)} 
                        placeholder="Pesquisar por nome do script ou área..." 
                        className="bg-transparent border-none outline-none w-full text-white font-tech tracking-wider text-lg placeholder:text-jjk-muted/50" 
                    />
                    <button onClick=${onClose} className="text-jjk-muted hover:text-white bg-white/5 p-2 rounded-xl transition-colors"><${I.X} width=${18} /></button>
                </div>
                
                <div className="overflow-y-auto p-3 flex-1">
                   ${q.trim() === '' ? html`
                      <div className="p-12 text-center text-jjk-muted/50 font-mono text-xs uppercase tracking-widest flex flex-col items-center gap-3">
                          <${I.Search} width=${32} className="opacity-50" />
                          Digite algo para invocar a busca global
                      </div>
                   ` : filtered.length === 0 ? html`
                      <div className="p-12 text-center text-jjk-muted font-mono text-xs uppercase tracking-widest flex flex-col items-center gap-3 text-jjk-red/70">
                          <${I.Shield} width=${32} className="opacity-50" />
                          Nenhuma técnica encontrada no Domínio
                      </div>
                   ` : filtered.map(s => html`
                      <div key=${s.name} className="flex justify-between items-center p-3 hover:bg-white/5 rounded-xl cursor-default group border border-transparent hover:border-white/5 transition-all mb-1">
                          <div className="flex items-center gap-4">
                              <div className="w-10 h-10 rounded-lg flex items-center justify-center ${s.status === 'running' ? 'bg-jjk-purple text-black animate-pulse' : 'bg-white/5 text-jjk-muted'}">
                                 <${s.status === 'running' ? I.Bolt : I.Shield} width=${18} />
                              </div>
                              <div>
                                  <div className="font-bold text-white uppercase text-sm font-tech tracking-wider group-hover:text-jjk-purple transition-colors">${s.name}</div>
                                  <div className="text-[10px] font-mono text-jjk-muted flex items-center gap-2 mt-0.5">
                                      <span className="truncate max-w-[200px]">${s.area || 'Diversos'}</span>
                                      <span className="opacity-30">|</span>
                                      <span className=${s.status === 'running' ? 'text-jjk-purple font-bold' : s.status === 'error' ? 'text-jjk-red' : ''}>${s.status.toUpperCase()}</span>
                                  </div>
                              </div>
                          </div>
                          <div className="shrink-0 flex gap-2">
                              ${s.status === 'running' ? html`
                                 <button onClick=${(e) => { e.stopPropagation(); onAction('kill', { name: s.name }); onClose(); }} className="text-xs bg-jjk-red/10 border border-jjk-red/30 text-jjk-red px-4 py-2 rounded-xl hover:bg-jjk-red hover:text-white font-bold tracking-widest">INTERROMPER</button>
                              `: html`
                                 <button disabled=${!s.is_active} onClick=${(e) => { e.stopPropagation(); onAction('run', { name: s.name }); onClose(); }} className="text-xs bg-jjk-blue/10 border border-jjk-blue/30 text-jjk-blue px-4 py-2 rounded-xl hover:bg-jjk-blue hover:text-white disabled:opacity-30 font-bold tracking-widest disabled:cursor-not-allowed">EXECUTAR</button>
                              `}
                          </div>
                      </div>
                   `)}
                </div>
                <div className="bg-black/40 p-3 text-[9px] font-mono text-center text-jjk-muted/50 uppercase border-t border-white/5 shrink-0">
                    Pressione <kbd className="bg-white/10 px-1.5 py-0.5 rounded ml-1 mr-1">ESC</kbd> para fechar
                </div>
            </div>
        </div>
      `;
    };

    // ==================== APP ====================
    function App() {
      const [data, setData] = useState(null);
      const [view, setView] = useState('grid');
      const [toasts, setToasts] = useState([]);
      const [modal, setModal] = useState(false);
      const [about, setAbout] = useState(null);

      const [activeTab, setActiveTab] = useState('dashboard');
      const [selectedArea, setSelectedArea] = useState('ALL');
      const [searchModalOpen, setSearchModalOpen] = useState(false);
      const [serverLog, setServerLog] = useState('');
      const logContainerRef = useRef(null);

      const addToast = (msg, type = 'info') => {
        const id = Date.now();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
      };

      // Search Modal hotkey
      useEffect(() => {
        const handleKeyDown = (e) => {
          if ((e.ctrlKey || e.metaKey) && (e.key === 'f' || e.key === 'F')) {
            e.preventDefault();
            setSearchModalOpen(true);
          }
          if (e.key === 'Escape') setSearchModalOpen(false);
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, []);

      // Socket logic
      useEffect(() => {
        const socket = io();
        socket.on('connect', () => addToast('Energia Amaldiçoada conectada!', 'success'));
        socket.on('disconnect', () => addToast('Sinal perdido com o Domínio...', 'error'));
        socket.on('status_update', (d) => setData(d));

        fetch('/api/status').then(r => r.json()).then(d => setData(d));
        return () => socket.disconnect();
      }, []);

      // Monitor Log fetch
      useEffect(() => {
        let interval;
        if (activeTab === 'monitor') {
          const fetchLog = async () => {
            try {
              const r = await fetch('/api/server-log');
              const d = await r.json();
              setServerLog(d.log || '--- FIM DOS REGISTROS ---');
            } catch (e) { }
          };
          fetchLog();
          interval = setInterval(fetchLog, 3000);
        }
        return () => clearInterval(interval);
      }, [activeTab]);

      // Scroll log to bottom when updated
      useEffect(() => {
        if (logContainerRef.current && activeTab === 'monitor') {
          logContainerRef.current.scrollTop = logContainerRef.current.scrollHeight;
        }
      }, [serverLog, activeTab]);

      const handleAction = async (endpoint, payload) => {
        try {
          const r = await fetch(`/api/${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const res = await r.json();
          if (res.success) addToast(res.message || 'Técnica Ativada!', 'success');
          else addToast(res.message || 'Falha na Expansão', 'error');
        } catch (e) {
          addToast('Erro na conexão com o Domínio', 'error');
        }
      };

      const openAbout = async () => {
        try {
          const r = await fetch('/api/about');
          setAbout(await r.json());
          setModal(true);
        } catch (e) { addToast('Erro ao ler selos de segurança', 'error'); }
      };

      const allScripts = data?.scripts || [];
      const areaNames = useMemo(() => {
        const areas = new Set(allScripts.map(s => s.area || 'Diversos'));
        return Array.from(areas).sort();
      }, [allScripts]);

      const filteredByArea = useMemo(() => {
        if (selectedArea === 'ALL') return allScripts;
        return allScripts.filter(s => (s.area || 'Diversos') === selectedArea);
      }, [allScripts, selectedArea]);

      const scriptsByAreaDisplay = useMemo(() => {
        const areas = {};
        filteredByArea.forEach(s => {
          const a = s.area || 'Diversos';
          if (!areas[a]) areas[a] = [];
          areas[a].push(s);
        });
        return Object.entries(areas).sort((a, b) => a[0].localeCompare(b[0]));
      }, [filteredByArea]);

      if (!data) return html`
            <div className="h-screen flex flex-col items-center justify-center font-tech tracking-[0.5em] text-jjk-purple bg-jjk-bg">
                <div className="w-16 h-16 border-t-4 border-jjk-purple rounded-full animate-spin mb-8"></div>
                INVOCANDO DOMÍNIO...
            </div>`;

      return html`
            <div className="flex h-screen overflow-hidden bg-jjk-bg text-white font-body">
                <${Toast} toasts=${toasts} />
                <${SearchModal} isOpen=${searchModalOpen} onClose=${() => setSearchModalOpen(false)} scripts=${allScripts} onAction=${handleAction} />

                <!-- SIDEBAR -->
                <aside className="w-64 shrink-0 glass border-r border-jjk-purple/20 flex flex-col z-50 shadow-2xl">
                    <div className="h-20 flex px-6 items-center border-b border-white/5 shrink-0 gap-4">
                        <div className="w-10 h-10 bg-jjk-purple rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(168,85,247,0.5)]">
                            <${I.Levels || I.Bolt} className="text-black" width=${24} />
                        </div>
                        <div>
                            <h1 className="text-sm font-black font-tech tracking-wider jjk-title uppercase text-white">
                                Servidor <span className="text-jjk-purple block text-xs">Agendamentos</span>
                            </h1>
                        </div>
                    </div>

                    <!-- Main Navigation -->
                    <div className="p-4 border-b border-white/5 space-y-2 shrink-0">
                        <button 
                            onClick=${() => setActiveTab('dashboard')} 
                            className="w-full flex items-center gap-4 px-4 py-3 rounded-2xl font-tech text-xs tracking-widest font-bold transition-all ${activeTab === 'dashboard' ? 'bg-jjk-purple text-black shadow-[0_0_15px_rgba(168,85,247,0.3)]' : 'text-jjk-muted hover:bg-white/5 hover:text-white'}">
                            <${I.Layout} width=${18} className=${activeTab === 'dashboard' ? 'text-black' : 'text-jjk-purple'} />
                            DASHBOARD
                        </button>
                        <button 
                            onClick=${() => setActiveTab('monitor')} 
                            className="w-full flex items-center gap-4 px-4 py-3 rounded-2xl font-tech text-xs tracking-widest font-bold transition-all ${activeTab === 'monitor' ? 'bg-jjk-purple text-black shadow-[0_0_15px_rgba(168,85,247,0.3)]' : 'text-jjk-muted hover:bg-white/5 hover:text-white'}">
                            <${I.Terminal} width=${18} className=${activeTab === 'monitor' ? 'text-black' : 'text-jjk-blue'} />
                            MONITOR
                        </button>
                        <button 
                            onClick=${() => setSearchModalOpen(true)} 
                            className="w-full flex items-center justify-between px-4 py-3 rounded-2xl font-tech text-xs tracking-widest font-bold transition-all text-jjk-muted hover:bg-white/5 hover:text-white group border border-dashed border-white/10 mt-2">
                            <div className="flex items-center gap-4">
                                <${I.Search} width=${18} className="text-jjk-muted group-hover:text-white" />
                                BUSCAR
                            </div>
                            <span className="text-[9px] font-mono opacity-50 border border-white/20 rounded px-1 group-hover:bg-white/10">CTRL+F</span>
                        </button>
                    </div>

                    <!-- Area Filters -->
                    <div className="flex-1 overflow-y-auto p-4 space-y-1">
                        <div className="text-[10px] font-mono text-jjk-muted/50 uppercase tracking-[0.2em] mb-4 pl-2 flex items-center gap-2">
                           <${I.Layers} width=${14} /> Filtro de Domínios
                        </div>
                        <button 
                            className="w-full text-left px-4 py-2.5 rounded-xl text-xs font-bold uppercase transition-all tracking-wider font-body cursor-pointer flex justify-between items-center ${selectedArea === 'ALL' ? 'bg-jjk-purple/10 text-jjk-purple border border-jjk-purple/30' : 'text-jjk-muted hover:bg-white/5 hover:text-white border border-transparent'}" 
                            onClick=${() => setSelectedArea('ALL')}>
                            <span className="truncate">TODOS OS SCRIPTs</span>
                            <span className="text-[9px] font-mono opacity-50 bg-white/5 px-2 py-0.5 rounded-full">${allScripts.length}</span>
                        </button>
                        ${areaNames.map(a => {
        const count = allScripts.filter(s => (s.area || 'Diversos') === a).length;
        return html`
                            <button 
                                key=${a}
                                className="w-full text-left px-4 py-2.5 rounded-xl text-xs font-bold uppercase transition-all tracking-wider font-body cursor-pointer flex justify-between items-center ${selectedArea === a ? 'bg-jjk-blue/10 text-jjk-blue border border-jjk-blue/30' : 'text-jjk-muted hover:bg-white/5 hover:text-white border border-transparent'}" 
                                onClick=${() => setSelectedArea(a)}
                                title=${a}>
                                <span className="truncate pr-2">${a}</span>
                                <span className="text-[9px] font-mono opacity-50 bg-white/5 px-2 py-0.5 rounded-full">${count}</span>
                            </button>
                        `})}
                    </div>
                </aside>

                <!-- MAIN CONTENT AREA -->
                <div className="flex-1 flex flex-col min-w-0 bg-black/40 relative">
                    <!-- HEADER -->
                    <header className="h-20 glass sticky top-0 z-40 px-8 flex items-center justify-between border-b border-jjk-purple/10 shrink-0">
                        <div className="flex items-center gap-4 text-jjk-muted font-mono text-xs uppercase tracking-widest">
                            <span className=${activeTab === 'dashboard' ? 'text-white font-bold' : ''}>DASHBOARD</span>
                            <span className="opacity-30">/</span>
                            <span className="text-jjk-purple truncate max-w-[300px]">${selectedArea === 'ALL' ? 'Visão Geral' : selectedArea}</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick=${() => handleAction('reload', {})} className="btn bg-jjk-panel border border-jjk-purple/30 p-2.5 rounded-xl text-jjk-purple hover:bg-jjk-purple hover:text-black transition-all group" title="Recarregar Selos Excel">
                                <${I.Refresh} width=${18} className="group-hover:rotate-180 transition-transform duration-500" />
                            </button>
                            <button onClick=${openAbout} className="btn bg-jjk-panel border border-white/10 p-2.5 rounded-xl text-jjk-muted hover:text-white transition-all" title="Sobre o Domínio">
                                <${I.Info} width=${18} />
                            </button>
                        </div>
                    </header>

                    <div className="flex-1 overflow-y-auto relative p-8">
                        ${activeTab === 'dashboard' ? html`
                            <!-- STATS BAR -->
                            <div className="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
                                ${[
            { label: 'Total Scripts', val: data.total_scripts, clr: 'text-white' },
            { label: 'Ativos', val: data.active_scripts, clr: 'text-jjk-blue' },
            { label: 'Rodando', val: data.running_count, clr: 'text-jjk-purple', pulse: data.running_count > 0 },
            { label: 'Na Fila', val: data.queued_count, clr: 'text-jjk-gold' },
            { label: 'Hora Servidor', val: data.server_time, clr: 'text-white', mono: true }
          ].map(s => html`
                                    <div key=${s.label} className="jjk-stat-card bg-jjk-panel p-4 rounded-2xl border-l-4 border-y border-r border-y-white/5 border-r-white/5 ${s.pulse ? 'border-l-jjk-purple animate-aura-purple' : 'border-l-white/10'} hover:bg-white/5 transition-colors">
                                        <div className="text-[10px] uppercase tracking-widest text-jjk-muted font-bold mb-1">${s.label}</div>
                                        <div className="text-2xl font-black ${s.clr} ${s.mono ? 'font-mono' : 'font-tech'}">${s.val}</div>
                                    </div>
                                `)}
                            </div>

                            <!-- ACTIVE WORKFLOW -->
                            ${data.active_flow && html`
                                <div className="mb-8 p-6 rounded-2xl bg-gradient-to-r from-jjk-purple/20 via-jjk-panel to-jjk-blue/20 border border-jjk-purple/40 animate-aura-purple relative overflow-hidden">
                                    <div className="flex justify-between items-center mb-4 relative z-10">
                                        <div className="flex items-center gap-3">
                                            <div className="w-2 h-2 rounded-full bg-jjk-purple animate-ping"></div>
                                            <h2 className="text-lg font-tech font-bold tracking-tight">FLUXO AMALDIÇOADO: <span className="text-jjk-purple uppercase">${data.active_flow.name}</span></h2>
                                        </div>
                                        <div className="text-xs font-mono text-jjk-muted uppercase tracking-widest">
                                            Passo ${data.active_flow.current_step + 1} de ${data.active_flow.total_steps}
                                        </div>
                                    </div>
                                    <div className="h-1.5 w-full bg-black/40 rounded-full overflow-hidden mb-5 relative z-10">
                                        <div className="h-full progress-bar animate-progress" style=${{ width: `${((data.active_flow.current_step + 1) / data.active_flow.total_steps) * 100}%` }}></div>
                                    </div>
                                    <div className="flex gap-2 flex-wrap relative z-10">
                                        ${data.active_flow.scripts.map((s, i) => html`
                                            <span key=${s} className="px-3 py-1.5 rounded-lg text-[10px] font-mono border transition-all ${i === data.active_flow.current_step ? 'bg-jjk-purple text-black border-jjk-purple font-bold shadow-[0_0_10px_rgba(168,85,247,0.5)]' :
              i < data.active_flow.current_step ? 'bg-jjk-purple/10 text-jjk-purple/60 border-jjk-purple/20' : 'bg-black/40 text-jjk-muted border-white/10'
            }">${s}</span>
                                        `)}
                                    </div>
                                </div>
                            `}

                            <!-- VIEW TOGGLE -->
                            <div className="mb-6 flex items-center justify-end gap-6">
                                <div className="flex bg-jjk-panel p-1 rounded-2xl border border-white/5">
                                    <button onClick=${() => setView('grid')} className="p-2.5 rounded-xl transition-all ${view === 'grid' ? 'bg-jjk-purple text-black' : 'text-jjk-muted hover:text-white'}">
                                        <${I.Layout} width=${18} />
                                    </button>
                                    <button onClick=${() => setView('list')} className="p-2.5 rounded-xl transition-all ${view === 'list' ? 'bg-jjk-purple text-black' : 'text-jjk-muted hover:text-white'}">
                                        <${I.List} width=${18} />
                                    </button>
                                </div>
                            </div>

                            <!-- SCRIPTS LIST -->
                            ${scriptsByAreaDisplay.length === 0 ? html`
                                <div className="h-64 flex flex-col items-center justify-center text-jjk-muted opacity-30 select-none bg-jjk-panel rounded-3xl border border-white/5">
                                    <${I.Shield} width=${64} className="mb-4" />
                                    <p className="font-tech tracking-[0.5em] text-xs">NENHUMA TÉCNICA NESTE DOMÍNIO</p>
                                </div>
                            ` : scriptsByAreaDisplay.map(([area, scripts]) => html`
                                <section key=${area} className="mb-10 last:mb-0">
                                    <div className="flex items-center gap-4 mb-6">
                                        <h2 className="text-[11px] font-black font-tech tracking-[0.4em] uppercase text-jjk-muted whitespace-nowrap">${area}</h2>
                                        <div className="h-px w-full bg-gradient-to-r from-white/10 to-transparent"></div>
                                        <span className="text-[10px] font-mono text-jjk-muted/50 whitespace-nowrap">${scripts.length} OBJETO(S)</span>
                                    </div>
                                    
                                    <div className=${view === 'grid' ? "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" : "space-y-3"}>
                                        ${scripts.map(s => html`<${ScriptItem} key=${s.name} script=${s} view=${view} onAction=${handleAction} />`)}
                                    </div>
                                </section>
                            `)}
                        ` : html`
                            <!-- MONITOR TAB -->
                            <div className="h-full flex flex-col bg-jjk-panel border border-white/10 rounded-2xl overflow-hidden shadow-2xl relative">
                                <div className="h-12 border-b border-white/10 flex justify-between items-center px-6 bg-black/40 shrink-0">
                                    <div className="flex gap-2">
                                        <div className="w-3 h-3 rounded-full bg-jjk-red/80"></div>
                                        <div className="w-3 h-3 rounded-full bg-jjk-gold/80"></div>
                                        <div className="w-3 h-3 rounded-full bg-jjk-blue/80"></div>
                                    </div>
                                    <div className="text-[10px] font-mono uppercase tracking-widest text-jjk-muted">
                                        Logs do Orquestrador Principal
                                    </div>
                                    <div className="w-16"></div> <!-- spacer -->
                                </div>
                                <div ref=${logContainerRef} className="flex-1 p-6 overflow-y-auto font-mono text-[11px] leading-relaxed text-[#00ff00] whitespace-pre cursor-text">
                                    ${serverLog || 'Conectando ao terminal...'}
                                </div>
                            </div>
                        `}
                    </div>

                    <!-- FOOTER -->
                    <footer className="h-12 border-t border-white/5 glass flex items-center justify-between px-8 text-[10px] font-mono tracking-widest text-jjk-muted gap-4 shrink-0">
                        <div className="flex items-center gap-6">
                            <span className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-jjk-blue animate-pulse shadow-[0_0_8px_rgba(14,165,233,0.5)]"></div> RUNTIME ATIVO</span>
                        </div>
                        <div className="text-right uppercase">
                            Célula Python Monitoração • C6 Bank
                        </div>
                    </footer>
                </div>

                <!-- MODAL ABOUT -->
                ${modal && about && html`
                    <div className="fixed inset-0 z-[1000] flex items-center justify-center p-6" onClick=${() => setModal(false)}>
                        <div className="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
                        <div className="bg-jjk-panel border border-jjk-purple/30 p-8 rounded-3xl w-full max-w-2xl relative z-10 animate-aura-purple max-h-[85vh] overflow-y-auto shadow-2xl" onClick=${e => e.stopPropagation()}>
                            <div className="flex justify-between items-start mb-6">
                                <div>
                                    <h2 className="text-2xl font-black font-tech jjk-title tracking-wider text-white">SELOS DO <span className="text-jjk-purple">DOMÍNIO</span></h2>
                                    <p className="text-xs font-mono text-jjk-purple/60 tracking-widest uppercase mt-1">Versão ${about.version}</p>
                                </div>
                                <button onClick=${() => setModal(false)} className="p-2 hover:bg-white/5 rounded-full transition-all text-jjk-muted hover:text-white">
                                    <${I.X} width=${20} />
                                </button>
                            </div>

                            <p className="text-sm text-jjk-muted leading-relaxed mb-6 font-medium">${about.description}</p>

                            <div className="bg-jjk-purple/5 border border-jjk-purple/20 rounded-2xl p-5 mb-8">
                                <h4 className="flex items-center gap-2 text-jjk-purple font-bold text-xs uppercase tracking-widest mb-3">
                                    <${I.Shield} width=${14} /> Protocolos de Segurança
                                </h4>
                                <ul className="text-[11px] grid gap-2">
                                    <li className="flex items-center gap-3"><span className="text-jjk-purple font-bold">›</span> <strong className="text-white font-tech tracking-wider">REDE:</strong> <span className="text-jjk-muted">${about.security.network}</span></li>
                                    <li className="flex items-center gap-3"><span className="text-jjk-purple font-bold">›</span> <strong className="text-white font-tech tracking-wider">HEADERS:</strong> <span className="text-jjk-muted">${about.security.headers}</span></li>
                                    <li className="flex items-center gap-3"><span className="text-jjk-purple font-bold">›</span> <strong className="text-white font-tech tracking-wider">PIDs:</strong> <span className="text-jjk-muted">${about.security.data}</span></li>
                                </ul>
                            </div>

                            <div className="bg-red-500/5 border border-red-500/20 rounded-2xl p-5 mb-6">
                                <h4 className="flex items-center gap-2 text-red-500 font-bold text-xs uppercase tracking-widest mb-2">
                                    <${I.Bolt} width=${14} /> Selo LGPD
                                </h4>
                                <p className="text-[11px] text-red-100/60 leading-relaxed italic">${about.lgpd}</p>
                            </div>

                            <div className="flex justify-between items-end border-t border-white/5 pt-6 text-[10px] font-mono uppercase tracking-tighter text-jjk-muted">
                                <div>Autor: ${about.author}</div>
                                <div className="text-right">Built with Flask • psutil • Socket.IO</div>
                            </div>
                        </div>
                    </div>
                `}
            </div>`;
    }

    // ==================== SCRIPT ITEM ====================
    function ScriptItem({ script: s, view, onAction }) {
      const isRun = s.status === 'running';
      const isQue = s.status === 'queued';
      const isErr = s.status === 'error';
      const isAct = s.is_active;

      if (view === 'grid') {
        return html`
                <div className="bg-jjk-panel p-6 rounded-3xl border border-white/5 relative flex flex-col h-full transition-all duration-300 hover:border-jjk-purple/30 group hover:shadow-[0_8px_30px_rgba(0,0,0,0.5)] ${isRun ? 'animate-aura-purple aura-active border-jjk-purple/40 ring-1 ring-jjk-purple/20' : ''} ${!isAct ? 'opacity-40 grayscale' : ''}">
                    <!-- Progress top bit -->
                    ${isRun && html`<div className="absolute top-0 left-0 right-0 h-1 progress-bar animate-progress rounded-t-3xl overflow-hidden"></div>`}
                    
                    <div className="flex justify-between items-start mb-6">
                        <div className="flex flex-col min-w-0 pr-2">
                           <span className="text-[9px] font-black uppercase tracking-[0.3em] font-mono leading-none mb-1.5 shadow-sm ${isRun ? 'text-jjk-purple animate-pulse' :
            isErr ? 'text-jjk-red' :
              isQue ? 'text-jjk-gold' : 'text-jjk-blue'
          }">${s.status}</span>
                           <h3 className="text-sm font-bold font-tech text-white leading-tight uppercase truncate" title=${s.name}>${s.name}</h3>
                        </div>
                        ${isRun && s.pid ? html`
                            <div className="px-2 py-1 bg-jjk-blue/10 border border-jjk-blue/20 rounded-lg flex items-center gap-1.5 shrink-0">
                                <div className="w-1.5 h-1.5 rounded-full bg-jjk-blue animate-ping"></div>
                                <span className="text-[10px] font-mono text-jjk-blue font-bold">PID ${s.pid}</span>
                            </div>
                        ` : ''}
                    </div>

                    <div className="space-y-2.5 flex-1 mb-6 bg-black/20 p-3 rounded-2xl border border-white/5">
                        <div className="flex items-center gap-3 text-jjk-muted">
                            <${I.Clock} width=${14} className="shrink-0 text-jjk-purple/60" />
                            <span className="text-[11px] font-mono uppercase truncate">${s.raw_slots?.length ? s.raw_slots.join(', ') + 'h' : 'Manual'}</span>
                        </div>
                        <div className="flex items-center justify-between text-[11px] font-medium pt-2 border-t border-white/5">
                            <span className="text-jjk-muted uppercase tracking-wider text-[9px]">Próx. Exec</span>
                            <span className="font-mono ${s.is_delayed ? 'text-jjk-red font-bold animate-pulse' : 'text-jjk-blue'}">${s.next_run_hour || '-'}</span>
                        </div>
                        <div className="flex items-center justify-between text-[11px] font-medium">
                            <span className="text-jjk-muted uppercase tracking-wider text-[9px]">Runs Hoje</span>
                            <span className="font-mono text-white">${s.executions_today || '0/0'}</span>
                        </div>
                    </div>

                    <div className="mt-auto">
                        <div className="flex gap-2">
                        ${isRun ? html`
                            <button onClick=${() => onAction('kill', { name: s.name })} className="w-full h-11 bg-jjk-red/10 border border-jjk-red/30 text-jjk-red font-bold text-xs uppercase tracking-widest rounded-2xl hover:bg-jjk-red hover:text-white transition-all shadow-sm">
                                INTERROMPER
                            </button>
                        ` : html`
                            <button disabled=${!isAct} onClick=${() => onAction('run', { name: s.name })} className="w-full h-11 bg-jjk-blue/10 border border-jjk-blue/20 text-jjk-blue font-bold text-xs uppercase tracking-widest rounded-2xl hover:bg-jjk-blue hover:text-white transition-all shadow-sm active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed">
                                EXECUTAR 
                            </button>
                        `}
                        </div>
                    </div>
                </div>`;
      } else {
        // LIST VIEW
        return html`
                <div className="bg-jjk-panel p-3 rounded-2xl border transition-all duration-300 flex items-center justify-between group px-6 hover:bg-white/5 ${isRun ? 'border-jjk-purple/40 ring-1 ring-jjk-purple/20' : 'border-white/5'} ${!isAct ? 'opacity-40 grayscale' : ''}">
                    <div className="flex items-center gap-6 min-w-0 flex-1">
                        <div className="flex items-center justify-center w-8 h-8 rounded-lg shrink-0 ${isRun ? 'bg-jjk-purple text-black' : 'bg-white/5 text-jjk-muted'}">
                            <${isRun ? I.Bolt : I.Shield} width=${16} />
                        </div>
                        <div className="min-w-0">
                            <h4 className="font-bold text-sm font-tech text-white uppercase truncate">${s.name}</h4>
                            <div className="text-[10px] font-mono text-jjk-muted flex items-center gap-3">
                                <span>CRON: ${s.raw_slots?.length ? s.raw_slots.join(', ') + 'h' : 'MANUAL'}</span>
                                <span className="opacity-30">|</span>
                                <span className=${isRun ? 'text-jjk-purple font-bold' : isErr ? 'text-jjk-red' : ''}>${s.status.toUpperCase()}</span>
                            </div>
                        </div>
                    </div>

                    <div className="flex items-center gap-6 shrink-0 ml-4">
                        ${isRun && html`
                            <div className="font-mono text-jjk-blue text-xs flex items-center gap-2 bg-jjk-blue/10 px-2.5 py-1 rounded-lg">
                                <${I.Clock} width=${12} />
                                ${s.duration_seconds}s
                            </div>
                        `}
                        <div className="flex gap-2 min-w-[120px] justify-end">
                            ${isRun ? html`
                                <button onClick=${() => onAction('kill', { name: s.name })} className="px-4 py-2 bg-jjk-red/10 border border-jjk-red/30 text-jjk-red rounded-xl hover:bg-jjk-red hover:text-white transition-all shadow-sm font-bold text-[10px] tracking-widest">
                                    KILL
                                </button>
                            ` : html`
                                <button disabled=${!isAct} onClick=${() => onAction('run', { name: s.name })} className="px-4 py-2 bg-jjk-blue/10 border border-jjk-blue/30 text-jjk-blue rounded-xl hover:bg-jjk-blue hover:text-white transition-all shadow-sm disabled:opacity-10 font-bold text-[10px] tracking-widest">
                                    RUN
                                </button>
                            `}
                        </div>
                    </div>
                </div>`;
      }
    }

    // ==================== RENDER ====================
    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
  </script>
</body>

</html>
