<!DOCTYPE html>
<html lang="pt-br" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ServidorAgendamentos - Expansão de Domínio</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/htm@3/dist/htm.umd.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            jjk: {
              bg: '#050505',
              panel: '#0a0a0f',
              card: '#11111a',
              purple: '#a855f7', // Energia Amaldiçoada
              purpleGlow: '#d8b4fe',
              blue: '#0ea5e9',   // Gojo Satoru
              blueGlow: '#7dd3fc',
              red: '#ef4444',    // Ryomen Sukuna
              redGlow: '#fca5a5',
              gold: '#fbbf24',   // Brilho Negro / Kento Nanami
              silver: '#e2e8f0',
              muted: '#64748b'
            }
          },
          fontFamily: {
            tech: ['Orbitron', 'sans-serif'],
            body: ['Rajdhani', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          },
          animation: {
            'aura-purple': 'auraPurple 3s ease-in-out infinite',
            'aura-red': 'auraRed 3s ease-in-out infinite',
            'aura-blue': 'auraBlue 3s ease-in-out infinite',
            'slide-up': 'slideUp 0.4s cubic-bezier(.16,1,.3,1)',
            'progress': 'progressBar 2s linear infinite',
            'ping-slow': 'ping 3s cubic-bezier(0, 0, 0.2, 1) infinite',
          },
          keyframes: {
            auraPurple: {
              '0%, 100%': { boxShadow: '0 0 15px -2px rgba(168, 85, 247, 0.3), 0 0 30px -5px rgba(168, 85, 247, 0.1)' },
              '50%': { boxShadow: '0 0 35px 2px rgba(168, 85, 247, 0.6), 0 0 50px 5px rgba(168, 85, 247, 0.2)' },
            },
            auraRed: {
              '0%, 100%': { boxShadow: '0 0 15px -2px rgba(239, 68, 68, 0.3), 0 0 30px -5px rgba(239, 68, 68, 0.1)' },
              '50%': { boxShadow: '0 0 35px 2px rgba(239, 68, 68, 0.6), 0 0 50px 5px rgba(239, 68, 68, 0.2)' },
            },
            auraBlue: {
              '0%, 100%': { boxShadow: '0 0 15px -2px rgba(14, 165, 233, 0.3), 0 0 30px -5px rgba(14, 165, 233, 0.1)' },
              '50%': { boxShadow: '0 0 35px 2px rgba(14, 165, 233, 0.6), 0 0 50px 5px rgba(14, 165, 233, 0.2)' },
            },
            slideUp: { '0%': { transform: 'translateY(24px)', opacity: 0 }, '100%': { transform: 'translateY(0)', opacity: 1 } },
            progressBar: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
          },
        },
      },
    };
  </script>
  <style>
    body {
      font-family: 'Rajdhani', sans-serif;
      background: #050505;
      color: #e2e8f0;
      overflow-x: hidden;
    }

    .glass {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(10, 10, 15, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(168, 85, 247, 0.2);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(168, 85, 247, 0.4);
    }

    .progress-bar {
      background-size: 200% 100%;
      background-image: linear-gradient(90deg, transparent, #a855f7, #ef4444, #0ea5e9, transparent);
    }

    .toast {
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .toast-success {
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      border-color: rgba(14, 165, 233, 0.3);
    }

    .toast-error {
      background: linear-gradient(135deg, #991b1b, #ef4444);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .toast-info {
      background: linear-gradient(135deg, #6b21a8, #a855f7);
      border-color: rgba(168, 85, 247, 0.3);
    }

    /* JJK Specific: Cursed Energy Aura */
    .aura-active {
      position: relative;
    }

    .aura-active::after {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      z-index: -1;
      filter: blur(8px);
      background: linear-gradient(45deg, #a855f7, #ef4444, #0ea5e9);
      background-size: 400% 400%;
      animation: cursedGlow 5s ease infinite;
      border-radius: inherit;
      opacity: 0.4;
    }

    @keyframes cursedGlow {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .jjk-title {
      text-shadow: 0 0 10px rgba(168, 85, 247, 0.5), 0 0 20px rgba(14, 165, 233, 0.3);
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script>
    const html = htm.bind(React.createElement);
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ==================== TOAST ====================
    const Toast = ({ toasts }) => html`
        <div className="fixed bottom-6 right-6 z-[100] space-y-3 w-full max-w-xs transition-all">
            ${toasts.map(t => html`
                <div key=${t.id} className="toast toast-${t.type} animate-slide-up flex items-center gap-3">
                    <div className="shrink-0 w-2 h-2 rounded-full bg-white opacity-80 shadow-[0_0_8px_white]"></div>
                    ${t.msg}
                </div>`)}
        </div>
    `;

    // ==================== ICONS ====================
    const I = {
      Play: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
      Stop: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="6" width="12" height="12"/></svg>`,
      Search: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>`,
      Refresh: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>`,
      Info: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>`,
      Layout: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
      List: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
      Clock: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
      Bolt: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`,
      Shield: p => html`<svg ...${p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`
    };

    // ==================== APP ====================
    function App() {
      const [data, setData] = useState(null);
      const [view, setView] = useState('grid');
      const [search, setSearch] = useState('');
      const [toasts, setToasts] = useState([]);
      const [modal, setModal] = useState(false);
      const [about, setAbout] = useState(null);

      const addToast = (msg, type = 'info') => {
        const id = Date.now();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
      };

      // Socket logic
      useEffect(() => {
        const socket = io();
        socket.on('connect', () => addToast('Energia Amaldiçoada conectada!', 'success'));
        socket.on('disconnect', () => addToast('Sinal perdido com o Domínio...', 'error'));
        socket.on('status_update', (d) => setData(d));

        // Initial fetch
        fetch('/api/status').then(r => r.json()).then(d => setData(d));

        return () => socket.disconnect();
      }, []);

      const handleAction = async (endpoint, payload) => {
        try {
          const r = await fetch(`/api/${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const res = await r.json();
          if (res.success) addToast(res.message || 'Técnica Ativada!', 'success');
          else addToast(res.message || 'Falha na Expansão', 'error');
        } catch (e) {
          addToast('Erro na conexão com o Domínio', 'error');
        }
      };

      const openAbout = async () => {
        try {
          const r = await fetch('/api/about');
          setAbout(await r.json());
          setModal(true);
        } catch (e) { addToast('Erro ao ler selos de segurança', 'error'); }
      };

      const filteredScripts = useMemo(() => {
        if (!data?.scripts) return [];
        const q = search.toLowerCase();
        return data.scripts.filter(s =>
          s.name.toLowerCase().includes(q) || (s.area || '').toLowerCase().includes(q)
        );
      }, [data, search]);

      const scriptsByArea = useMemo(() => {
        const areas = {};
        filteredScripts.forEach(s => {
          const a = s.area || 'Diversos';
          if (!areas[a]) areas[a] = [];
          areas[a].push(s);
        });
        return Object.entries(areas).sort((a, b) => a[0].localeCompare(b[0]));
      }, [filteredScripts]);

      if (!data) return html`
            <div className="h-screen flex flex-col items-center justify-center font-tech tracking-[0.5em] text-jjk-purple">
                <div className="w-16 h-16 border-t-4 border-jjk-purple rounded-full animate-spin mb-8"></div>
                INVOCANDO DOMÍNIO...
            </div>`;

      return html`
            <div className="min-h-screen flex flex-col">
                <${Toast} toasts=${toasts} />
                
                <!-- HEADER -->
                <header className="h-20 glass sticky top-0 z-50 px-8 flex items-center justify-between border-b border-jjk-purple/20">
                    <div className="flex items-center gap-4">
                        <div className="w-10 h-10 bg-jjk-purple rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(168,85,247,0.5)]">
                            <${I.Bolt} className="text-black" width=${24} />
                        </div>
                        <div>
                            <h1 className="text-xl font-black font-tech tracking-wider jjk-title uppercase">
                                Servidor <span className="text-jjk-purple">Agendamentos</span>
                            </h1>
                            <p className="text-[10px] uppercase tracking-[0.3em] text-jjk-muted font-mono leading-none">Célula Python • Expansão de Domínio</p>
                        </div>
                    </div>

                    <div className="flex items-center gap-3">
                        <button onClick=${() => handleAction('reload', {})} className="btn bg-jjk-panel border border-jjk-purple/30 p-2.5 rounded-xl text-jjk-purple hover:bg-jjk-purple hover:text-black transition-all group" title="Recarregar Selos">
                            <${I.Refresh} width=${18} className="group-hover:rotate-180 transition-transform duration-500" />
                        </button>
                        <button onClick=${openAbout} className="btn bg-jjk-panel border border-white/10 p-2.5 rounded-xl text-jjk-muted hover:text-white transition-all" title="Sobre o Domínio">
                            <${I.Info} width=${18} />
                        </button>
                    </div>
                </header>

                <!-- STATS BAR -->
                <div className="p-8 grid grid-cols-2 md:grid-cols-5 gap-4">
                    ${[
          { label: 'Total Scripts', val: data.total_scripts, clr: 'text-white' },
          { label: 'Ativos', val: data.active_scripts, clr: 'text-jjk-blue' },
          { label: 'Rodando', val: data.running_count, clr: 'text-jjk-purple', pulse: data.running_count > 0 },
          { label: 'Na Fila', val: data.queued_count, clr: 'text-jjk-gold' },
          { label: 'Hora Servidor', val: data.server_time, clr: 'text-white', mono: true }
        ].map(s => html`
                        <div key=${s.label} className="jjk-stat-card glass p-4 rounded-2xl border-l-4 ${s.pulse ? 'border-jjk-purple animate-aura-purple' : 'border-white/10'}">
                            <div className="text-[10px] uppercase tracking-widest text-jjk-muted font-bold mb-1">${s.label}</div>
                            <div className="text-2xl font-black ${s.clr} ${s.mono ? 'font-mono' : 'font-tech'}">${s.val}</div>
                        </div>
                    `)}
                </div>

                <!-- ACTIVE WORKFLOW -->
                ${data.active_flow && html`
                    <div className="mx-8 mb-8 p-6 rounded-2xl bg-gradient-to-r from-jjk-purple/20 via-jjk-panel to-jjk-blue/20 border border-jjk-purple/40 animate-aura-purple">
                        <div className="flex justify-between items-center mb-4">
                            <div className="flex items-center gap-3">
                                <div className="w-2 h-2 rounded-full bg-jjk-purple animate-ping"></div>
                                <h2 className="text-lg font-tech font-bold tracking-tight">FLUXO AMALDIÇOADO: <span className="text-jjk-purple uppercase">${data.active_flow.name}</span></h2>
                            </div>
                            <div className="text-xs font-mono text-jjk-muted uppercase tracking-widest">
                                Passo ${data.active_flow.current_step + 1} de ${data.active_flow.total_steps}
                            </div>
                        </div>
                        <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden mb-4">
                            <div className="h-full progress-bar animate-progress" style=${{ width: `${((data.active_flow.current_step + 1) / data.active_flow.total_steps) * 100}%` }}></div>
                        </div>
                        <div className="flex gap-2 flex-wrap">
                            ${data.active_flow.scripts.map((s, i) => html`
                                <span key=${s} className="px-3 py-1 rounded-lg text-[10px] font-mono border transition-all ${i === data.active_flow.current_step ? 'bg-jjk-purple text-black border-jjk-purple font-bold shadow-[0_0_10px_rgba(168,85,247,0.5)]' :
            i < data.active_flow.current_step ? 'bg-jjk-purple/10 text-jjk-purple/60 border-jjk-purple/20' : 'bg-transparent text-jjk-muted border-white/10'
          }">${s}</span>
                            `)}
                        </div>
                    </div>
                `}

                <!-- CONTROLS -->
                <div className="px-8 mb-6 flex items-center justify-between gap-6">
                    <div className="relative flex-1 max-w-lg">
                        <${I.Search} className="absolute left-4 top-1/2 -translate-y-1/2 text-jjk-muted" width=${18} />
                        <input 
                            type="text" 
                            className="w-full bg-jjk-panel border border-white/5 rounded-2xl py-3 pl-12 pr-4 outline-none focus:border-jjk-purple/50 focus:shadow-[0_0_20px_rgba(168,85,247,0.1)] transition-all font-body text-sm"
                            placeholder="Pesquisar técnicas ou áreas amaldiçoadas..."
                            value=${search}
                            onChange=${e => setSearch(e.target.value)}
                        />
                    </div>
                    <div className="flex glass p-1 rounded-2xl border border-white/5">
                        <button onClick=${() => setView('grid')} className="p-2.5 rounded-xl transition-all ${view === 'grid' ? 'bg-jjk-purple text-black' : 'text-jjk-muted hover:text-white'}">
                            <${I.Layout} width=${18} />
                        </button>
                        <button onClick=${() => setView('list')} className="p-2.5 rounded-xl transition-all ${view === 'list' ? 'bg-jjk-purple text-black' : 'text-jjk-muted hover:text-white'}">
                            <${I.List} width=${18} />
                        </button>
                    </div>
                </div>

                <!-- MAIN -->
                <main className="flex-1 px-8 pb-12">
                    ${scriptsByArea.length === 0 ? html`
                        <div className="h-64 flex flex-col items-center justify-center text-jjk-muted opacity-30 select-none">
                            <${I.Shield} width=${64} className="mb-4" />
                            <p className="font-tech tracking-[0.5em] text-xs">NENHUMA TÉCNICA ENCONTRADA</p>
                        </div>
                    ` : scriptsByArea.map(([area, scripts]) => html`
                        <section key=${area} className="mb-10 last:mb-0">
                            <div className="flex items-center gap-4 mb-6">
                                <h2 className="text-[11px] font-black font-tech tracking-[0.4em] uppercase text-jjk-muted whitespace-nowrap">${area}</h2>
                                <div className="h-px w-full bg-gradient-to-r from-white/10 to-transparent"></div>
                                <span className="text-[10px] font-mono text-jjk-muted/50 whitespace-nowrap">${scripts.length} OBJETO(S)</span>
                            </div>
                            
                            <div className=${view === 'grid' ? "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" : "space-y-3"}>
                                ${scripts.map(s => html`<${ScriptItem} key=${s.name} script=${s} view=${view} onAction=${handleAction} />`)}
                            </div>
                        </section>
                    `)}
                </main>

                <!-- FOOTER -->
                <footer className="p-8 border-t border-white/5 glass flex flex-col md:flex-row items-center justify-between text-[11px] font-mono tracking-widest text-jjk-muted gap-4">
                    <div className="flex items-center gap-6">
                        <span className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-jjk-blue animate-pulse shadow-[0_0_8px_rgba(14,165,233,0.5)]"></div> DOMÍNIO ONLINE</span>
                        <span className="hidden sm:inline opacity-30">|</span>
                        <span className="flex items-center gap-2">${data.running_count} RODANDO</span>
                        <span className="flex items-center gap-2">${data.queued_count} NA FILA</span>
                    </div>
                    <div className="text-right">
                        <div>Célula Python Monitoração • C6 Bank</div>
                        <div className="opacity-40 mt-1 uppercase text-[9px]">Localhost Only • LGPD Compliant • PID Isolated</div>
                    </div>
                </footer>

                <!-- MODAL ABOUT -->
                ${modal && about && html`
                    <div className="fixed inset-0 z-[100] flex items-center justify-center p-6" onClick=${() => setModal(false)}>
                        <div className="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
                        <div className="glass p-8 rounded-3xl w-full max-w-2xl relative z-10 border border-jjk-purple/30 animate-aura-purple max-h-[85vh] overflow-y-auto" onClick=${e => e.stopPropagation()}>
                            <div className="flex justify-between items-start mb-6">
                                <div>
                                    <h2 className="text-2xl font-black font-tech jjk-title tracking-wider text-white">SELOS DO <span className="text-jjk-purple">DOMÍNIO</span></h2>
                                    <p className="text-xs font-mono text-jjk-purple/60 tracking-widest uppercase mt-1">Versão ${about.version}</p>
                                </div>
                                <button onClick=${() => setModal(false)} className="p-2 hover:bg-white/5 rounded-full transition-all text-jjk-muted hover:text-white">
                                    <${I.Refresh} width=${20} className="rotate-45" />
                                </button>
                            </div>

                            <p className="text-sm text-jjk-muted leading-relaxed mb-6 font-medium">${about.description}</p>

                            <div className="bg-jjk-purple/5 border border-jjk-purple/20 rounded-2xl p-5 mb-8">
                                <h4 className="flex items-center gap-2 text-jjk-purple font-bold text-xs uppercase tracking-widest mb-3">
                                    <${I.Shield} width=${14} /> Protocolos de Segurança
                                </h4>
                                <ul className="text-[11px] grid gap-2">
                                    <li className="flex items-center gap-3"><span className="text-jjk-purple font-bold">›</span> <strong>Rede:</strong> ${about.security.network}</li>
                                    <li className="flex items-center gap-3"><span className="text-jjk-purple font-bold">›</span> <strong>Headers:</strong> ${about.security.headers}</li>
                                    <li className="flex items-center gap-3"><span className="text-jjk-purple font-bold">›</span> <strong>PIDs:</strong> ${about.security.data}</li>
                                </ul>
                            </div>

                            <div className="bg-red-500/5 border border-red-500/20 rounded-2xl p-5 mb-6">
                                <h4 className="flex items-center gap-2 text-red-500 font-bold text-xs uppercase tracking-widest mb-2">
                                    <${I.Bolt} width=${14} /> Selo LGPD
                                </h4>
                                <p className="text-[11px] text-red-100/60 leading-relaxed italic">${about.lgpd}</p>
                            </div>

                            <div className="flex justify-between items-end border-t border-white/5 pt-6 text-[10px] font-mono uppercase tracking-tighter text-jjk-muted">
                                <div>Autor: ${about.author}</div>
                                <div className="text-right">Built with FastAPI • psutil • WebSocket</div>
                            </div>
                        </div>
                    </div>
                `}
            </div>`;
    }

    // ==================== SCRIPT ITEM ====================
    function ScriptItem({ script: s, view, onAction }) {
      const isRun = s.status === 'running';
      const isQue = s.status === 'queued';
      const isErr = s.status === 'error';
      const isIdle = s.status === 'idle';
      const isAct = s.is_active;

      if (view === 'grid') {
        return html`
                <div className="card glass p-6 rounded-3xl border border-white/5 relative flex flex-col h-full transition-all duration-300 hover:border-jjk-purple/30 group ${isRun ? 'animate-aura-purple aura-active border-jjk-purple/40 ring-1 ring-jjk-purple/20' : ''} ${!isAct ? 'opacity-40 grayscale' : ''}">
                    <!-- Progress top bit -->
                    ${isRun && html`<div className="absolute top-0 left-0 right-0 h-1 progress-bar animate-progress rounded-t-3xl overflow-hidden"></div>`}
                    
                    <div className="flex justify-between items-start mb-6">
                        <div className="flex flex-col">
                           <span className="text-[9px] font-black uppercase tracking-[0.3em] font-mono leading-none mb-1 shadow-sm ${isRun ? 'text-jjk-purple animate-pulse' :
            isErr ? 'text-jjk-red' :
              isQue ? 'text-jjk-gold' : 'text-jjk-blue'
          }">${s.status}</span>
                           <h3 className="text-base font-bold font-tech text-white leading-tight uppercase truncate max-w-[180px]" title=${s.name}>${s.name}</h3>
                        </div>
                        ${isRun && s.pid ? html`
                            <div className="px-2 py-1 bg-jjk-blue/10 border border-jjk-blue/20 rounded-lg flex items-center gap-1.5 ">
                                <div className="w-1.5 h-1.5 rounded-full bg-jjk-blue animate-ping"></div>
                                <span className="text-[10px] font-mono text-jjk-blue font-bold">PID ${s.pid}</span>
                            </div>
                        ` : ''}
                    </div>

                    <div className="space-y-2.5 flex-1 mb-6">
                        <div className="flex items-center gap-3 text-jjk-muted">
                            <${I.Clock} width=${14} className="shrink-0 text-jjk-purple/60" />
                            <span className="text-[11px] font-mono uppercase truncate">${s.raw_slots?.length ? s.raw_slots.join(', ') + 'h' : 'Manual'}</span>
                        </div>
                        <div className="flex items-center justify-between text-[11px] font-medium pt-2 border-t border-white/5">
                            <span className="text-jjk-muted uppercase tracking-wider">PRÓX. EXEC</span>
                            <span className="font-mono ${s.is_delayed ? 'text-jjk-red font-bold animate-pulse' : 'text-jjk-blue'}">${s.next_run_hour || '-'}</span>
                        </div>
                        <div className="flex items-center justify-between text-[11px] font-medium">
                            <span className="text-jjk-muted uppercase tracking-wider">EXECUÇÕES HOJE</span>
                            <span className="font-mono text-white">${s.executions_today || '0/0'}</span>
                        </div>
                    </div>

                    <div className="mt-auto">
                        <div className="flex gap-2">
                        ${isRun ? html`
                            <button onClick=${() => onAction('kill', { name: s.name })} className="w-full h-11 bg-jjk-red/10 border border-jjk-red/30 text-jjk-red font-bold text-xs uppercase tracking-widest rounded-2xl hover:bg-jjk-red hover:text-white transition-all shadow-sm">
                                INTERROMPER
                            </button>
                        ` : html`
                            <button onClick=${() => onAction('run', { name: s.name })} disabled=${!isAct} className="w-full h-11 bg-jjk-blue/10 border border-jjk-blue/20 text-jjk-blue font-bold text-xs uppercase tracking-widest rounded-2xl hover:bg-jjk-blue hover:text-white transition-all shadow-sm active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed">
                                EXECUTAR 
                            </button>
                        `}
                        </div>
                    </div>
                </div>`;
      } else {
        // LIST VIEW
        return html`
                <div className="glass p-3 rounded-2xl border transition-all duration-300 flex items-center justify-between group px-6 ${isRun ? 'border-jjk-purple/40 ring-1 ring-jjk-purple/20' : 'border-white/5'} ${!isAct ? 'opacity-40 grayscale' : ''}">
                    <div className="flex items-center gap-6 min-w-0 flex-1">
                        <div className="flex items-center justify-center w-8 h-8 rounded-lg ${isRun ? 'bg-jjk-purple text-black' : 'bg-white/5 text-jjk-muted'}">
                            <${isRun ? I.Bolt : I.Shield} width=${16} />
                        </div>
                        <div className="min-w-0">
                            <h4 className="font-bold text-sm text-white uppercase truncate">${s.name}</h4>
                            <div className="text-[10px] font-mono text-jjk-muted flex items-center gap-3">
                                <span>CRON: ${s.raw_slots?.length ? s.raw_slots.join(', ') + 'h' : 'MANUAL'}</span>
                                <span className="opacity-30">|</span>
                                <span className=${isRun ? 'text-jjk-purple font-bold' : isErr ? 'text-jjk-red' : ''}>${s.status.toUpperCase()}</span>
                            </div>
                        </div>
                    </div>

                    <div className="flex items-center gap-6 shrink-0 ml-4">
                        ${isRun && html`
                            <div className="font-mono text-jjk-blue text-xs flex items-center gap-2">
                                <${I.Clock} width=${12} />
                                ${s.duration_seconds}s
                            </div>
                        `}
                        <div className="flex gap-2 min-w-[120px] justify-end">
                            ${isRun ? html`
                                <button onClick=${() => onAction('kill', { name: s.name })} className="p-2.5 bg-jjk-red/10 border border-jjk-red/30 text-jjk-red rounded-xl hover:bg-jjk-red hover:text-white transition-all shadow-sm">
                                    <${I.Stop} width=${14} />
                                </button>
                            ` : html`
                                <button onClick=${() => onAction('run', { name: s.name })} disabled=${!isAct} className="p-2.5 bg-jjk-panel border border-white/5 text-jjk-blue rounded-xl hover:bg-jjk-blue hover:text-white transition-all shadow-sm disabled:opacity-10">
                                    <${I.Play} width=${14} />
                                </button>
                            `}
                        </div>
                    </div>
                </div>`;
      }
    }

    // ==================== RENDER ====================
    ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
  </script>
</body>

</html>
